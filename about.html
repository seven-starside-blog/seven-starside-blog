<style>
  .about-hero {
    background: linear-gradient(160deg, var(--red-900) 0%, #3a0505 100%);
    padding: 56px 20px 48px;
    color: #fff;
    text-align: center;
  }
  .avatar-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--red-400), var(--red-800));
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 40px; margin-bottom: 16px;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
  }
  .about-hero h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .about-hero .tagline { font-size: 14px; color: rgba(255,255,255,0.6); }

  .about-body { padding: 40px 0 60px; }

  .profile-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .profile-card h2 {
    font-size: 16px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .profile-card h2::after {
    content: ''; flex: 1; height: 1px; background: var(--red-100);
  }
  .profile-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .profile-table tr { border-bottom: 1px solid var(--border); }
  .profile-table tr:last-child { border-bottom: none; }
  .profile-table th { padding: 10px 12px 10px 0; color: var(--text-muted); font-weight: 600; width: 100px; vertical-align: top; white-space: nowrap; }
  .profile-table td { padding: 10px 0; line-height: 1.6; }

  .intro-text { font-size: 15px; line-height: 1.85; color: var(--text); }
  .intro-text p { margin-bottom: 14px; }
  .intro-text p:last-child { margin-bottom: 0; }

  /* スキルタグ */
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    background: var(--red-50); border: 1px solid var(--red-100);
    color: var(--red-700); border-radius: 6px;
    padding: 4px 12px; font-size: 13px; font-weight: 500;
  }

  /* 広告 */
  .ad-sidebar { position: sticky; top: calc(var(--header-h) + 16px); }

  @media (min-width: 700px) {
    .about-layout { display: grid; grid-template-columns: 1fr 240px; gap: 24px; }
  }
</style>
