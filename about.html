<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己紹介 | seven-starside-blog</title>
<meta name="description" content="seven-starside-blogの管理人プロフィールページです。">
<link rel="stylesheet" href="/seven-starside-blog/assets/style.css">
<script src="/seven-starside-blog/admin/config.js"></script>
<style>
  .about-hero { background:linear-gradient(160deg,var(--red-900) 0%,#3a0505 100%); padding:56px 20px 48px; color:#fff; text-align:center; }
  .avatar-ring { width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--red-400),var(--red-800));display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 0 0 4px rgba(255,255,255,0.15);overflow:hidden; }
  .avatar-ring img { width:100%;height:100%;object-fit:cover; }
  .about-hero h1 { font-size:24px;font-weight:800;margin-bottom:6px; }
  .about-hero .tagline { font-size:14px;color:rgba(255,255,255,0.6); }
  .about-body { padding:40px 0 60px; }
  .profile-card { background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:24px; }
  .profile-card h2 { font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px; }
  .profile-card h2::after { content:'';flex:1;height:1px;background:var(--red-100); }
  .profile-table { width:100%;border-collapse:collapse;font-size:14px; }
  .profile-table tr { border-bottom:1px solid var(--border); }
  .profile-table tr:last-child { border-bottom:none; }
  .profile-table th { padding:10px 12px 10px 0;color:var(--text-muted);font-weight:600;width:120px;vertical-align:top;white-space:nowrap; }
  .profile-table td { padding:10px 0;line-height:1.6; }
  .intro-text { font-size:15px;line-height:1.85;color:var(--text); }
  .intro-text p { margin-bottom:14px; }
  .intro-text p:last-child { margin-bottom:0; }

  /* SNSボタン */
  .sns-grid { display:flex;flex-wrap:wrap;gap:8px; }
  .sns-btn {
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;
    text-decoration:none;transition:transform 0.15s,box-shadow 0.15s;
    border:1px solid var(--border);background:var(--bg);color:var(--text);
  }
  .sns-btn:hover { transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.1); }
  .sns-btn .sns-icon { font-size:16px;width:20px;text-align:center;flex-shrink:0; }
  .sns-btn[data-service="x"]         { background:#000;border-color:#000;color:#fff; }
  .sns-btn[data-service="instagram"] { background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-color:transparent;color:#fff; }
  .sns-btn[data-service="youtube"]   { background:#ff0000;border-color:#ff0000;color:#fff; }
  .sns-btn[data-service="github"]    { background:#24292e;border-color:#24292e;color:#fff; }
  .sns-btn[data-service="bluesky"]   { background:#0085ff;border-color:#0085ff;color:#fff; }
  .sns-btn[data-service="tiktok"]    { background:#010101;border-color:#010101;color:#fff; }
  .sns-btn[data-service="note"]      { background:#41c9b4;border-color:#41c9b4;color:#fff; }
  .sns-btn[data-service="threads"]   { background:#101010;border-color:#101010;color:#fff; }
  .sns-btn[data-service="facebook"]  { background:#1877f2;border-color:#1877f2;color:#fff; }
  .sns-btn[data-service="linkedin"]  { background:#0a66c2;border-color:#0a66c2;color:#fff; }

  @media(min-width:700px){.about-layout{display:grid;grid-template-columns:1fr 240px;gap:24px;}}
  .sidebar-sticky{position:sticky;top:calc(var(--header-h)+16px);}
</style>
</head>
<body>
<header class="site-header">
  <a href="/seven-starside-blog/" class="logo">seven<span>★</span>starside</a>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニューを開く"><span></span><span></span><span></span></button>
</header>

<main class="page-body">
  <div class="about-hero" id="about-hero">
    <div class="avatar-ring" id="avatar-el">★</div>
    <h1 id="hero-name">seven-starside</h1>
    <p class="tagline" id="hero-tagline">ブログ管理人</p>
  </div>

  <div class="about-body">
    <div class="container">
      <div class="about-layout">
        <div>
          <!-- 自己紹介テキスト -->
          <div class="profile-card">
            <h2>はじめまして</h2>
            <div class="intro-text" id="intro-text">
              <div class="loading-spinner" style="padding:20px 0"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- プロフィール -->
          <div class="profile-card" id="profile-card">
            <h2>プロフィール</h2>
            <table class="profile-table" id="profile-table">
              <tr><td colspan="2" style="color:var(--text-muted);font-size:13px;">読み込み中...</td></tr>
            </table>
          </div>

          <!-- SNS -->
          <div class="profile-card" id="sns-card" style="display:none;">
            <h2>SNS・リンク</h2>
            <div class="sns-grid" id="sns-grid"></div>
          </div>

          <div class="ad-unit">広告スペース</div>
        </div>

        <!-- サイドバー -->
        <div>
          <div class="sidebar-sticky">
            <div class="profile-card" style="text-align:center;" id="sidebar-card">
              <div style="font-size:48px;margin-bottom:12px;" id="sidebar-avatar">★</div>
              <div style="font-size:16px;font-weight:700;margin-bottom:4px;" id="sidebar-name">seven-starside</div>
              <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;" id="sidebar-tagline">ブログ管理人</div>
              <a href="/seven-starside-blog/articles.html" style="display:block;padding:9px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-align:center;">記事一覧を見る</a>
            </div>
            <div class="ad-unit" style="min-height:250px;flex-direction:column;gap:4px;"><div>広告スペース</div><div style="font-size:11px;">(サイドバー)</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-links">
    <a href="/seven-starside-blog/">トップ</a>
    <a href="/seven-starside-blog/about.html">自己紹介</a>
    <a href="/seven-starside-blog/articles.html">記事一覧</a>
  </div>
  <div>© 2025 seven-starside-blog</div>
</footer>

<script src="/seven-starside-blog/assets/app.js"></script>
<script>
initDrawer('about.html');

const SNS_ICONS = {
  x:'𝕏', instagram:'📷', youtube:'▶', github:'⌥', bluesky:'🦋',
  tiktok:'♪', note:'📓', threads:'🧵', facebook:'f', linkedin:'in',
  website:'🌐', other:'🔗'
};
const SNS_LABELS = {
  x:'X', instagram:'Instagram', youtube:'YouTube', github:'GitHub',
  bluesky:'Bluesky', tiktok:'TikTok', note:'note', threads:'Threads',
  facebook:'Facebook', linkedin:'LinkedIn', website:'Webサイト', other:'リンク'
};

(async () => {
  try {
    const base = typeof BLOG_CONFIG !== 'undefined' ? `/${BLOG_CONFIG.GITHUB_REPO}` : '';
    const res = await fetch(`${base}/data/profile.json?_=${Date.now()}`);
    const p = await res.json();

    // ヒーロー
    document.getElementById('hero-name').textContent    = p.name    || 'seven-starside';
    document.getElementById('hero-tagline').textContent = p.tagline || 'ブログ管理人';
    document.getElementById('sidebar-name').textContent    = p.name    || 'seven-starside';
    document.getElementById('sidebar-tagline').textContent = p.tagline || 'ブログ管理人';
    if (p.avatar) {
      document.getElementById('avatar-el').innerHTML = `<img src="${p.avatar}" alt="${p.name}">`;
      document.getElementById('sidebar-avatar').innerHTML = `<img src="${p.avatar}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">`;
    }

    // 自己紹介文
    document.getElementById('intro-text').innerHTML = p.intro || '<p>自己紹介はまだ設定されていません。</p>';

    // プロフィール行
    const rows = p.profile || [];
    if (rows.length) {
      document.getElementById('profile-table').innerHTML =
        rows.map(r => `<tr><th>${r.label}</th><td>${r.value}</td></tr>`).join('');
    } else {
      document.getElementById('profile-card').style.display = 'none';
    }

    // SNS
    const snsLinks = (p.sns || []).filter(s => s.url);
    if (snsLinks.length) {
      document.getElementById('sns-card').style.display = 'block';
      document.getElementById('sns-grid').innerHTML = snsLinks.map(s => {
        const icon  = SNS_ICONS[s.service]  || '🔗';
        const label = s.label || SNS_LABELS[s.service] || s.service;
        return `<a href="${s.url}" target="_blank" rel="noopener noreferrer" class="sns-btn" data-service="${s.service}">
          <span class="sns-icon">${icon}</span>${label}
        </a>`;
      }).join('');
    }
  } catch(e) {
    document.getElementById('intro-text').innerHTML = '<p>プロフィールの読み込みに失敗しました。</p>';
  }
})();
</script>
</body>
</html>
