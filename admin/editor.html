<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事エディター | 管理画面</title>
<script src="config.js"></script>
<script src="auth-guard.js"></script>
<script src="github-api.js"></script>
<style>
  :root {
    --red-50: #fff1f1;
    --red-100: #ffe0e0;
    --red-200: #ffc0c0;
    --red-400: #f06060;
    --red-600: #cc2222;
    --red-700: #aa1818;
    --red-800: #881010;
    --red-900: #5a0808;
    --gray-50: #fafafa;
    --gray-100: #f4f4f4;
    --gray-200: #e8e8e8;
    --gray-300: #d0d0d0;
    --gray-500: #888;
    --gray-700: #444;
    --gray-900: #111;
    --bg: #fff;
    --surface: #fafafa;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #cc2222;
    --accent-hover: #aa1818;
    --radius: 8px;
    --font: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #888;
      --gray-100: #222;
      --gray-200: #2e2e2e;
      --gray-300: #3e3e3e;
      --gray-50: #1a1a1a;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === ヘッダー === */
  header {
    background: var(--red-900);
    color: #fff;
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  header .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
    text-decoration: none;
  }
  header .sep { color: rgba(255,255,255,0.3); }
  header .page-title { font-size: 13px; color: rgba(255,255,255,0.7); }
  header .spacer { flex: 1; }
  header .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }
  header .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--red-600);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  /* === レイアウト === */
  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px;
    gap: 20px;
  }

  /* === メインエリア === */
  .main-area { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  /* === カード === */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--gray-50);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card-body { padding: 16px; }

  /* === タイトル入力 === */
  #title-input {
    width: 100%;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    line-height: 1.4;
    padding: 4px 0;
  }
  #title-input::placeholder { color: var(--gray-300); }

  /* === ツールバー === */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 8px 12px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 1px;
  }
  .toolbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 6px;
  }
  .tb-btn {
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    color: var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .tb-btn:hover { background: var(--gray-200); color: var(--text); }
  .tb-btn.active { background: var(--red-50); color: var(--accent); }
  .tb-btn svg { width: 14px; height: 14px; }
  .tb-btn[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: -26px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gray-900);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }
  .tb-select {
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    padding: 0 6px;
    cursor: pointer;
    outline: none;
  }

  /* === エディター本体 === */
  /* ===== エディター本文（閲覧画面と完全一致） ===== */
  #edit-area {
    min-height: 420px;
    padding: 20px 24px;
    outline: none;
    font-size: 16px;
    line-height: 1.9;
    color: var(--text);
    font-family: var(--font);
  }
  /* テキスト選択時の色を明示（デフォルトで文字が見えなくなる問題を防ぐ） */
  #edit-area::selection,
  #edit-area *::selection {
    background: rgba(204, 34, 34, 0.25);
    color: var(--text);
  }
  #edit-area:empty::before {
    content: '本文を入力してください…';
    color: var(--gray-300);
    pointer-events: none;
    display: block;
  }
  /* 見出し */
  #edit-area h1 { font-size: 24px; font-weight: 700; margin: 32px 0 12px; color: var(--text); }
  #edit-area h2 {
    font-size: 20px; font-weight: 700; margin: 28px 0 10px;
    padding-bottom: 6px; border-bottom: 2px solid var(--red-200);
    color: var(--text);
  }
  #edit-area h3 { font-size: 17px; font-weight: 700; margin: 20px 0 8px; color: var(--text); }
  /* 段落・インライン */
  #edit-area p   { margin: 0 0 16px; }
  #edit-area strong { color: var(--accent); font-weight: 700; }
  #edit-area em  { font-style: italic; }
  #edit-area a   { color: var(--accent); text-decoration: underline; }
  #edit-area a:hover { opacity: 0.8; }
  /* 引用 */
  #edit-area blockquote {
    border-left: 3px solid var(--red-400);
    padding: 8px 16px;
    margin: 16px 0;
    background: var(--red-50);
    color: var(--text-muted);
    border-radius: 0 6px 6px 0;
  }
  /* コード */
  #edit-area code {
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 13px;
  }
  #edit-area pre {
    background: var(--gray-900);
    color: #e0e0e0;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
    /* contenteditable内でもフォントを維持 */
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre;
  }
  #edit-area pre code { background: none; border: none; color: inherit; font-size: inherit; padding: 0; }
  /* リスト */
  #edit-area ul, #edit-area ol { padding-left: 24px; margin: 8px 0 16px; }
  #edit-area li { margin-bottom: 4px; }
  /* 画像・区切り */
  #edit-area img { border-radius: 8px; margin: 16px 0; max-width: 100%; display: block; }
  #edit-area hr  { border: none; border-top: 2px solid var(--red-100); margin: 24px 0; }
  /* テーブル */
  #edit-area table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
  #edit-area th, #edit-area td { padding: 10px 12px; border: 1px solid var(--border); text-align: left; }
  #edit-area th { background: var(--gray-100); font-weight: 600; }
  /* OGPカード（挿入後の見た目） */
  /* OGPカードラッパー */
  #edit-area .ogp-card-wrap {
    position: relative;
    display: block;
    margin: 12px 0;
    border-radius: 10px;
  }
  #edit-area .ogp-card-wrap .ogp-delete-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 24px; height: 24px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none; border-radius: 50%;
    font-size: 14px; line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    z-index: 10;
    padding: 0;
  }
  #edit-area .ogp-card-wrap:hover .ogp-delete-btn { display: flex; }
  #edit-area .ogp-card-wrap .ogp-delete-btn:hover { background: #e53e3e; }
  /* contenteditable のデフォルトスタイルリセット */
  #edit-area:focus { outline: none; }
  #edit-area div { margin: 0 0 8px; }

  .word-count {
    padding: 6px 16px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }

  /* === バックアップバナー === */
  .backup-bar {
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 7px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    display: none;
  }
  .backup-bar.visible { display: flex; }
  .backup-bar .restore-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--gray-300);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text);
    font-family: var(--font);
  }
  .backup-bar .restore-btn:hover { background: var(--gray-200); }

  /* === サイドバー === */
  .sidebar { display: flex; flex-direction: column; gap: 14px; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  input[type="date"], input[type="text"], textarea, select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="date"]:focus, input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(204,34,34,0.1);
  }

  /* === タグ入力 === */
  .tags-container {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    min-height: 38px;
    cursor: text;
    transition: border-color 0.15s;
    background: var(--bg);
  }
  .tags-container:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(204,34,34,0.1);
  }
  .tag-chip {
    background: var(--red-50);
    border: 1px solid var(--red-200);
    color: var(--red-700);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tag-chip .remove-tag {
    cursor: pointer;
    opacity: 0.5;
    font-size: 13px;
    line-height: 1;
    padding: 0 1px;
  }
  .tag-chip .remove-tag:hover { opacity: 1; }
  #tag-input {
    border: none !important;
    outline: none !important;
    padding: 2px 4px !important;
    font-size: 12px;
    min-width: 80px;
    flex: 1;
    background: transparent;
    box-shadow: none !important;
  }

  /* === アイキャッチ === */
  .thumbnail-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 12px;
    color: var(--text-muted);
  }
  .thumbnail-area:hover { border-color: var(--accent); background: var(--red-50); }
  .thumbnail-preview {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 6px;
    display: none;
  }

  /* === ステータス === */
  .status-group { display: flex; gap: 6px; }
  .status-btn {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .status-btn.active[data-status="draft"] {
    background: var(--gray-100);
    border-color: var(--gray-400);
    color: var(--gray-700);
    font-weight: 600;
  }
  .status-btn.active[data-status="published"] {
    background: var(--red-50);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* === アクションボタン === */
  .action-group { display: flex; flex-direction: column; gap: 8px; }
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
  .btn-secondary {
    width: 100%;
    padding: 9px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--gray-400); color: var(--text); background: var(--gray-50); }

  /* === 保存中インジケーター === */
  .save-indicator {
    font-size: 11px;
    text-align: center;
    color: var(--text-muted);
    padding: 4px;
  }
  .save-indicator.saving { color: var(--accent); }
  .save-indicator.saved { color: #228b22; }

  /* === リンク挿入モーダル === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: 12px;
    padding: 20px;
    width: 340px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .modal .field { margin-bottom: 10px; }
  .modal .field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal-actions .btn-cancel {
    flex: 1; padding: 8px; background: var(--gray-100); border: none; border-radius: 6px;
    cursor: pointer; font-family: var(--font); font-size: 13px; color: var(--text);
  }
  .modal-actions .btn-insert {
    flex: 1; padding: 8px; background: var(--accent); border: none; border-radius: 6px;
    cursor: pointer; font-family: var(--font); font-size: 13px; color: #fff; font-weight: 600;
  }

  /* === 自動保存トースト === */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--gray-900);
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* レスポンシブ */
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <a href="dashboard.html" class="logo">管理画面</a>
  <span class="sep">/</span>
  <span class="page-title" id="header-mode">新規記事</span>
  <div class="spacer"></div>
  <div class="user-info">
    <div class="avatar" id="user-avatar">U</div>
    <span id="user-name">ログイン中...</span>
    <button onclick="adminLogout()" style="margin-left:8px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:5px;color:#fff;font-size:11px;padding:3px 8px;cursor:pointer;font-family:inherit;">ログアウト</button>
  </div>
</header>

<!-- モーダル：リンク挿入 -->
<div class="modal-overlay" id="link-modal">
  <div class="modal" style="width:400px;max-width:95vw;">
    <h3>リンクを挿入</h3>

    <!-- 挿入タイプ選択 -->
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="link-type-btn active" onclick="setLinkType('card')" id="type-card"
        style="flex:1;padding:7px;border:1.5px solid var(--accent);border-radius:7px;background:var(--red-50);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">
        🔗 カード形式
      </button>
      <button class="link-type-btn" onclick="setLinkType('inline')" id="type-inline"
        style="flex:1;padding:7px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">
        📝 テキストリンク
      </button>
    </div>

    <div class="field">
      <label>URL</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="link-url" placeholder="https://..." style="flex:1;">
        <button onclick="fetchOgp()" id="ogp-fetch-btn"
          style="padding:0 12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background 0.15s;">
          取得
        </button>
      </div>
    </div>

    <!-- OGPプレビュー -->
    <div id="ogp-preview" style="display:none;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;background:var(--gray-50);">
      <div style="display:flex;gap:0;">
        <img id="ogp-image" src="" alt="" style="width:90px;height:72px;object-fit:cover;flex-shrink:0;display:none;">
        <div style="padding:10px 12px;min-width:0;flex:1;">
          <div id="ogp-title" style="font-size:13px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
          <div id="ogp-desc"  style="font-size:11px;color:var(--text-muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5;"></div>
          <div id="ogp-site"  style="font-size:11px;color:var(--accent);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
        </div>
      </div>
    </div>
    <div id="ogp-loading" style="display:none;text-align:center;padding:12px;font-size:12px;color:var(--text-muted);">OGP情報を取得中...</div>
    <div id="ogp-error"   style="display:none;font-size:12px;color:var(--red-600);margin-bottom:10px;padding:8px;background:var(--red-50);border-radius:6px;"></div>

    <!-- テキストリンク用テキスト入力 -->
    <div class="field" id="link-text-field" style="display:none;">
      <label>表示テキスト</label>
      <input type="text" id="link-text" placeholder="リンクテキスト">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLinkModal()">キャンセル</button>
      <button class="btn-insert" onclick="insertLink()" id="btn-insert-link" disabled
        style="opacity:0.5;transition:opacity 0.15s;">挿入</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- メインレイアウト -->
<div class="layout">

  <!-- 左：エディター -->
  <div class="main-area">

    <!-- バックアップバナー -->
    <div class="backup-bar" id="backup-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0"/><path d="M12 8v4l3 3"/></svg>
      前回の下書きが残っています

    <!-- タイトル -->

      <div class="card-body">
        <input type="text" id="title-input" placeholder="記事のタイトルを入力..." maxlength="120">
      </div>
    </div>

    <!-- エディター本体 -->
    <div class="card" style="overflow:visible">
      <!-- ツールバー -->
      <div class="toolbar" id="editor-toolbar">
        <div class="toolbar-group">
          <select class="tb-select" id="block-select" onchange="applyBlockStyle(this.value); this.value=''" title="段落スタイル">
            <option value="">-- スタイル --</option>
            <option value="p">通常テキスト</option>
            <option value="h1">見出し1</option>

          </select>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button class="tb-btn" onclick="execCmd('bold')" title="太字 (Ctrl+B)"><b>B</b></button>
          <button class="tb-btn" onclick="execCmd('italic')" title="斜体 (Ctrl+I)"><i>I</i></button>
          <button class="tb-btn" onclick="execCmd('underline')" title="下線 (Ctrl+U)"><u>U</u></button>
          <button class="tb-btn" onclick="execCmd('strikeThrough')" title="打ち消し線">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><path d="M7 8c0-2.2 2-4 5-4s5 1.8 5 4"/><path d="M7 16c0 2.2 2 4 5 4s5-1.8 5-4"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="箇条書き">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
          </button>
          <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="番号リスト">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><text x="2" y="8" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">1.</text><text x="2" y="14" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">2.</text><text x="2" y="20" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">3.</text></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button class="tb-btn" onclick="openLinkModal()" title="リンクを挿入">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="tb-btn" onclick="insertImage()" title="画像を挿入">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </button>
          <button class="tb-btn" onclick="insertHr()" title="区切り線">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button class="tb-btn" onclick="document.execCommand('undo')" title="元に戻す (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13A9 9 0 1021 12"/></svg>
          </button>
          <button class="tb-btn" onclick="document.execCommand('redo')" title="やり直す (Ctrl+Y)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M21 13A9 9 0 113 12"/></svg>
          </button>
        </div>
      </div>

      <!-- コンテンツエリア（編集 + プレビュー） -->
      <div id="edit-area" contenteditable="true" data-placeholder="本文を入力してください…"></div>

      <!-- 文字数 -->
      <div class="word-count">
        <span id="char-count">0 文字</span>
        <span id="reading-time">読了時間: 約0分</span>
      </div>
    </div>

  </div>

  <!-- 右：サイドバー -->
  <div class="sidebar">

    <!-- 公開アクション -->
    <div class="card">
      <div class="card-header"><h2>公開設定</h2></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">

        <!-- ステータス -->
        <div>
          <div class="field-label">ステータス</div>
          <div class="status-group">
            <button class="status-btn active" data-status="draft" onclick="setStatus('draft')">下書き</button>
            <button class="status-btn" data-status="published" onclick="setStatus('published')">公開</button>
          </div>
        </div>

        <!-- 日付 -->
        <div>
          <div class="field-label">公開日時</div>
          <input type="date" id="pub-date">
        </div>

        <div class="save-indicator" id="save-indicator">未保存</div>

        <div class="action-group">
          <button class="btn-primary" onclick="saveArticle()" id="save-btn">保存する</button>
          <button class="btn-secondary" onclick="saveDraft()">下書き保存</button>
        </div>
      </div>
    </div>

    <!-- タグ -->
    <div class="card">
      <div class="card-header"><h2>タグ</h2></div>
      <div class="card-body">
        <div class="tags-container" id="tags-container" onclick="document.getElementById('tag-input').focus()">
          <input type="text" id="tag-input" placeholder="タグを入力 Enter で追加" style="border:none;outline:none;padding:2px 4px;font-size:12px;min-width:80px;flex:1;background:transparent;box-shadow:none;">
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">Enterまたはカンマで追加</p>
      </div>
    </div>

    <!-- アイキャッチ -->
    <div class="card">
      <div class="card-header"><h2>アイキャッチ画像</h2></div>
      <div class="card-body">
        <img id="thumbnail-preview" class="thumbnail-preview" alt="アイキャッチ">
        <div class="thumbnail-area" id="thumbnail-area" onclick="document.getElementById('thumbnail-input').click()">
          <div style="font-size:24px;margin-bottom:6px;opacity:0.3">🖼</div>
          <div>クリックして画像を選択</div>
          <div style="font-size:11px;margin-top:2px;opacity:0.6">PNG, JPG, WebP / 最大5MB</div>
        </div>
        <input type="file" id="thumbnail-input" accept="image/*" style="display:none" onchange="handleThumbnail(this)">
        <button id="remove-thumbnail" onclick="removeThumbnail()" style="display:none;width:100%;margin-top:8px;padding:6px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;">画像を削除</button>
      </div>
    </div>

    <!-- 抜粋 -->
    <div class="card">
      <div class="card-header"><h2>抜粋 / 説明文</h2></div>
      <div class="card-body">
        <textarea id="excerpt" rows="3" placeholder="記事の概要（検索結果やOGPに使用）" style="resize:vertical;"></textarea>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:right;" id="excerpt-count">0 / 160</div>
      </div>
    </div>

  </div>
</div>

<script>
// === 状態管理 ===
let currentStatus = 'draft';
let tags = [];
let savedRange = null;
let autoSaveTimer = null;
let editingId = null;     // 編集中の記事ID（nullなら新規）
let allArticles = [];     // 全記事キャッシュ
let editingArticleSha = null; // GitHub API用SHA

// === 初期化 ===
document.addEventListener('DOMContentLoaded', () => {
  // URLパラメータから編集対象IDを取得
  const urlParams = new URLSearchParams(location.search);
  editingId = urlParams.get('id') || null;

  if (editingId) {
    document.getElementById('header-mode').textContent = '記事を編集';
    document.title = '記事を編集 | 管理画面';
    loadExistingArticle(editingId);
  } else {
    // 今日の日付をデフォルト設定
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('pub-date').value = today;
    document.getElementById('header-mode').textContent = '新規記事';
  }

  // バックアップチェック（新規のみ）
  if (!editingId) {
    const backup = localStorage.getItem('article_backup');
    if (backup) {
      document.getElementById('backup-bar').classList.add('visible');
    }
  }

  // セッションからユーザー情報を表示（auth-guard.jsで保証済み）
  const session = window.ADMIN_SESSION;
  if (session) {
    document.getElementById('user-name').textContent = session.name || session.email;
    if (session.picture) {
      document.getElementById('user-avatar').innerHTML = `<img src="${session.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
      document.getElementById('user-avatar').textContent = (session.name || 'U').charAt(0).toUpperCase();
    }
  }

  // プレースホルダー処理
  const editArea = document.getElementById('edit-area');
  editArea.addEventListener('focus', () => { if (editArea.innerHTML === '') editArea.style.color = 'var(--text)'; });
  editArea.addEventListener('blur', () => {});
  updateWordCount();
});

// (プレビュー・分割モードは削除済み)

// === ツールバーコマンド ===
function execCmd(cmd) {
  document.getElementById('edit-area').focus();
  document.execCommand(cmd, false, null);
  updateWordCount();
}

function applyBlockStyle(tag) {
  if (!tag) return;
  const area = document.getElementById('edit-area');
  area.focus();

  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  // カーソルのある最上位ブロック要素を探す
  let node = sel.getRangeAt(0).commonAncestorContainer;
  while (node && node.parentNode !== area) {
    node = node.parentNode;
  }
  if (!node || node === area) {
    // 選択なし→直接insertHTMLで新規段落追加
    if (tag === 'pre') {
      document.execCommand('insertHTML', false, '<pre><code>コードを入力</code></pre>');
    } else {
      document.execCommand('insertHTML', false, `<${tag}><br></${tag}>`);
    }
    updateWordCount();
    return;
  }

  if (tag === 'pre') {
    // preは既存ノードをラップ
    const pre = document.createElement('pre');
    const code = document.createElement('code');
    code.textContent = node.innerText || node.textContent || 'コードを入力';
    pre.appendChild(code);
    // styleを一切付けない
    node.replaceWith(pre);
    // カーソルをcodeの末尾に
    const r = document.createRange();
    r.selectNodeContents(code);
    r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
  } else {
    // 新しい要素に内容を移してstyle/class完全リセット
    const newEl = document.createElement(tag);
    newEl.innerHTML = node.innerHTML || '';
    // 子孫のインラインstyle・classをすべて除去（行間・フォントサイズ残留を防ぐ）
    newEl.removeAttribute('style');
    newEl.removeAttribute('class');
    newEl.querySelectorAll('[style],[class]').forEach(el => {
      el.removeAttribute('style');
      el.removeAttribute('class');
    });
    node.replaceWith(newEl);
    // カーソルを末尾に
    const r = document.createRange();
    r.selectNodeContents(newEl);
    r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
  }
  updateWordCount();
}

// 後方互換（古い呼び出し元が残っている場合用）
function formatBlock(tag) { applyBlockStyle(tag); }

function insertNodeAtCursor(node) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  range.deleteContents();
  range.insertNode(node);
  range.setStartAfter(node);
  sel.removeAllRanges();
  sel.addRange(range);
}

function insertHr() {
  document.getElementById('edit-area').focus();
  document.execCommand('insertHTML', false, '<hr style="border:none;border-top:2px solid var(--red-200);margin:16px 0;">');
}

// === リンクモーダル ===
let linkType = 'card'; // 'card' | 'inline'
let ogpData  = null;

function setLinkType(type) {
  linkType = type;
  document.getElementById('type-card').style.cssText   = type === 'card'
    ? 'flex:1;padding:7px;border:1.5px solid var(--accent);border-radius:7px;background:var(--red-50);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'
    : 'flex:1;padding:7px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
  document.getElementById('type-inline').style.cssText = type === 'inline'
    ? 'flex:1;padding:7px;border:1.5px solid var(--accent);border-radius:7px;background:var(--red-50);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'
    : 'flex:1;padding:7px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
  document.getElementById('link-text-field').style.display = type === 'inline' ? 'block' : 'none';
}

function openLinkModal() {
  savedRange = window.getSelection().rangeCount > 0 ? window.getSelection().getRangeAt(0).cloneRange() : null;
  const sel = window.getSelection();
  if (sel && sel.toString()) document.getElementById('link-text').value = sel.toString();
  ogpData = null;
  document.getElementById('link-url').value = '';
  document.getElementById('link-text').value = '';
  document.getElementById('ogp-preview').style.display = 'none';
  document.getElementById('ogp-error').style.display   = 'none';
  document.getElementById('ogp-loading').style.display = 'none';
  document.getElementById('btn-insert-link').disabled  = true;
  document.getElementById('btn-insert-link').style.opacity = '0.5';
  setLinkType('card');
  document.getElementById('link-modal').classList.add('open');
  document.getElementById('link-url').focus();
}

function closeLinkModal() {
  document.getElementById('link-modal').classList.remove('open');
}

// OGP取得（Cloudflare Worker経由）
async function fetchOgp() {
  const url = document.getElementById('link-url').value.trim();
  if (!url || !url.startsWith('http')) {
    showOgpError('有効なURLを入力してください（https://... から始まるURL）');
    return;
  }
  document.getElementById('ogp-preview').style.display = 'none';
  document.getElementById('ogp-error').style.display   = 'none';
  document.getElementById('ogp-loading').style.display = 'block';
  document.getElementById('ogp-fetch-btn').disabled    = true;
  document.getElementById('btn-insert-link').disabled  = true;
  document.getElementById('btn-insert-link').style.opacity = '0.5';
  ogpData = null;

  try {
    ogpData = await GitHubAPI.fetchOgp(url);

    // プレビュー表示
    document.getElementById('ogp-title').textContent = ogpData.title;
    document.getElementById('ogp-desc').textContent  = ogpData.desc;
    document.getElementById('ogp-site').textContent  = ogpData.site;
    const img = document.getElementById('ogp-image');
    if (ogpData.image) {
      img.src = ogpData.image;
      img.style.display = 'block';
      img.onerror = () => { img.style.display = 'none'; };
    } else {
      img.style.display = 'none';
    }
    document.getElementById('ogp-preview').style.display = 'block';
    document.getElementById('ogp-loading').style.display = 'none';

  } catch(e) {
    document.getElementById('ogp-loading').style.display = 'none';
    showOgpError('OGP情報の取得に失敗しました: ' + e.message);
    // 取得失敗でもURLは有効なので挿入は許可
  } finally {
    document.getElementById('ogp-fetch-btn').disabled   = false;
    document.getElementById('btn-insert-link').disabled = false;
    document.getElementById('btn-insert-link').style.opacity = '1';
  }
}

function showOgpError(msg) {
  const el = document.getElementById('ogp-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function insertLink() {
  const url = document.getElementById('link-url').value.trim();
  if (!url) { closeLinkModal(); return; }

  document.getElementById('edit-area').focus();
  if (savedRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  let html = '';

  if (linkType === 'card') {
    // OGPカード形式
    const title = ogpData?.title || url;
    const desc  = ogpData?.desc  || '';
    const site  = ogpData?.site  || new URL(url.startsWith('http') ? url : 'https://x').hostname;
    const image = ogpData?.image || '';
    html = `<div class="ogp-card-wrap" contenteditable="false">
  <button class="ogp-delete-btn" onclick="this.closest('.ogp-card-wrap').remove()" title="削除">✕</button>
  <a href="${url}" target="_blank" rel="noopener noreferrer"
    class="ogp-card"
    style="display:flex;gap:0;border:1px solid var(--border,#e8e8e8);border-radius:10px;overflow:hidden;text-decoration:none;color:inherit;background:var(--gray-50,#fafafa);max-width:100%;">
    ${image ? `<img src="${image}" alt="" style="width:120px;min-height:80px;object-fit:cover;flex-shrink:0;" onerror="this.style.display='none'">` : ''}
    <div style="padding:12px 14px;min-width:0;flex:1;">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a1a;">${title}</div>
      ${desc ? `<div style="font-size:12px;color:#666;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5;margin-bottom:4px;">${desc}</div>` : ''}
      <div style="font-size:11px;color:#cc2222;">${site}</div>
    </div>
  </a>
</div><p></p>`;
  } else {
    // テキストリンク形式
    const text = document.getElementById('link-text').value.trim() || url;
    html = `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:var(--accent,#cc2222);text-decoration:underline;">${text}</a>`;
  }

  document.execCommand('insertHTML', false, html);
  closeLinkModal();
  updateWordCount();
}

document.getElementById('link-url').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); fetchOgp(); } });

// === 画像挿入 ===
function insertImage() {
  const url = prompt('画像URLを入力してください：');
  if (url) {
    document.getElementById('edit-area').focus();
    document.execCommand('insertHTML', false, `<img src="${url}" alt="画像" style="max-width:100%;border-radius:6px;">`);
    updateWordCount();
  }
}

// === タグ管理 ===
const tagInput = document.getElementById('tag-input');
tagInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(tagInput.value.replace(',', '').trim());
  } else if (e.key === 'Backspace' && tagInput.value === '' && tags.length > 0) {
    removeTag(tags.length - 1);
  }
});

function addTag(value) {
  if (!value || tags.includes(value)) { tagInput.value = ''; return; }
  tags.push(value);
  renderTags();
  tagInput.value = '';
}

function removeTag(index) {
  tags.splice(index, 1);
  renderTags();
}

function renderTags() {
  const container = document.getElementById('tags-container');
  container.querySelectorAll('.tag-chip').forEach(c => c.remove());
  tags.forEach((tag, i) => {
    const chip = document.createElement('div');
    chip.className = 'tag-chip';
    chip.innerHTML = `${tag}<span class="remove-tag" onclick="removeTag(${i})">×</span>`;
    container.insertBefore(chip, tagInput);
  });
}

// === アイキャッチ ===
function handleThumbnail(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('画像は5MB以内にしてください'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById('thumbnail-preview');
    const area = document.getElementById('thumbnail-area');
    const removeBtn = document.getElementById('remove-thumbnail');
    preview.src = e.target.result;
    preview.style.display = 'block';
    area.style.display = 'none';
    removeBtn.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeThumbnail() {
  document.getElementById('thumbnail-preview').style.display = 'none';
  document.getElementById('thumbnail-area').style.display = 'block';
  document.getElementById('remove-thumbnail').style.display = 'none';
  document.getElementById('thumbnail-input').value = '';
}

// === ステータス切替 ===
function setStatus(status) {
  currentStatus = status;
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === status);
  });
  const saveBtn = document.getElementById('save-btn');
  saveBtn.textContent = status === 'published' ? '公開する' : '保存する';
}

// === 文字数カウント ===
const editArea = document.getElementById('edit-area');
editArea.addEventListener('input', () => {
  updateWordCount();
  scheduleAutoSave();
});

function updateWordCount() {
  const text = document.getElementById('edit-area').innerText || '';
  const chars = text.length;
  const minutes = Math.max(1, Math.ceil(chars / 400));
  document.getElementById('char-count').textContent = `${chars.toLocaleString()} 文字`;
  document.getElementById('reading-time').textContent = `読了時間: 約${minutes}分`;
}

// === 抜粋文字数 ===
document.getElementById('excerpt').addEventListener('input', function() {
  document.getElementById('excerpt-count').textContent = `${this.value.length} / 160`;
  if (this.value.length > 160) {
    this.value = this.value.slice(0, 160);
    document.getElementById('excerpt-count').textContent = '160 / 160';
  }
});

// === 自動保存（バックアップ） ===
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  document.getElementById('save-indicator').textContent = '入力中…';
  document.getElementById('save-indicator').className = 'save-indicator saving';
  autoSaveTimer = setTimeout(() => {
    const data = {
      title: document.getElementById('title-input').value,
      content: document.getElementById('edit-area').innerHTML,
      tags: [...tags],
      date: document.getElementById('pub-date').value,
      excerpt: document.getElementById('excerpt').value,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('article_backup', JSON.stringify(data));
    document.getElementById('save-indicator').textContent = '自動保存済み ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('save-indicator').className = 'save-indicator saved';
  }, 2000);
}

// === バックアップ復元 ===
function restoreBackup() {
  const raw = localStorage.getItem('article_backup');
  if (!raw) return;
  const data = JSON.parse(raw);
  if (confirm(`${new Date(data.savedAt).toLocaleString('ja-JP')} の下書きを復元しますか？`)) {
    document.getElementById('title-input').value = data.title || '';
    document.getElementById('edit-area').innerHTML = data.content || '';
    document.getElementById('pub-date').value = data.date || '';
    document.getElementById('excerpt').value = data.excerpt || '';
    tags = data.tags || [];
    renderTags();
    document.getElementById('backup-bar').classList.remove('visible');
    updateWordCount();
    showToast('下書きを復元しました');
  }
}

// === 既存記事の読み込み ===
async function loadExistingArticle(id) {
  document.getElementById('save-indicator').textContent = '読み込み中...';
  document.getElementById('save-indicator').className = 'save-indicator saving';
  try {
    const { articles, sha } = await GitHubAPI.getArticles();
    allArticles = articles;
    editingArticleSha = sha;
    const article = allArticles.find(a => a.id === id);
    if (!article) {
      showToast('記事が見つかりませんでした（ID: ' + id + '）');
      document.getElementById('save-indicator').textContent = '読み込み失敗';
      document.getElementById('save-indicator').className = 'save-indicator';
      return;
    }
    // フォームに値をセット
    document.getElementById('title-input').value  = article.title   || '';
    document.getElementById('edit-area').innerHTML = article.content || '';
    document.getElementById('pub-date').value      = article.date    || '';
    document.getElementById('excerpt').value       = article.excerpt || '';
    tags = article.tags || [];
    renderTags();
    setStatus(article.status || 'draft');
    updateWordCount();
    // アイキャッチ
    if (article.thumbnail) {
      const preview = document.getElementById('thumbnail-preview');
      preview.src = article.thumbnail;
      preview.style.display = 'block';
      document.getElementById('thumbnail-area').style.display = 'none';
      document.getElementById('remove-thumbnail').style.display = 'block';
    }
    document.getElementById('save-indicator').textContent = '読み込み完了';
    document.getElementById('save-indicator').className = 'save-indicator saved';
    setTimeout(() => {
      document.getElementById('save-indicator').textContent = '';
    }, 2000);
  } catch(e) {
    console.error('記事読み込み失敗:', e);
    showToast('記事の読み込みに失敗しました: ' + e.message);
    document.getElementById('save-indicator').textContent = '読み込み失敗: ' + e.message;
    document.getElementById('save-indicator').className = 'save-indicator';
  }
}

// === 保存 ===
async function saveArticle() {
  const title = document.getElementById('title-input').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }
  const bodyContent = document.getElementById('edit-area').innerHTML.trim();
  if (!bodyContent) { showToast('本文を入力してください'); return; }

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  document.getElementById('save-indicator').textContent = '保存中...';
  document.getElementById('save-indicator').className = 'save-indicator saving';

  try {
    // 全記事を取得（最新状態）
    if (!allArticles.length) {
      const { articles, sha } = await GitHubAPI.getArticles();
      allArticles = articles;
      editingArticleSha = sha;
    }

    const now = new Date().toISOString();
    const thumbnail = document.getElementById('thumbnail-preview').style.display !== 'none'
      ? document.getElementById('thumbnail-preview').src : '';

    if (editingId) {
      // 既存記事の更新
      const idx = allArticles.findIndex(a => a.id === editingId);
      if (idx !== -1) {
        allArticles[idx] = {
          ...allArticles[idx],
          title,
          content: bodyContent,
          tags: [...tags],
          date: document.getElementById('pub-date').value,
          excerpt: document.getElementById('excerpt').value,
          thumbnail,
          status: currentStatus,
          updatedAt: now,
        };
      }
    } else {
      // 新規記事の追加
      const newArticle = {
        id: Date.now().toString(),
        title,
        content: bodyContent,
        tags: [...tags],
        date: document.getElementById('pub-date').value,
        excerpt: document.getElementById('excerpt').value,
        thumbnail,
        status: currentStatus,
        createdAt: now,
        updatedAt: now,
      };
      allArticles.unshift(newArticle);
      editingId = newArticle.id;
      // URLを更新（新規→編集モードへ）
      history.replaceState(null, '', `editor.html?id=${editingId}`);
      document.getElementById('header-mode').textContent = '記事を編集';
    }

    // Worker経由でGitHubに保存
    const result = await GitHubAPI.saveArticles(allArticles, editingArticleSha);
    editingArticleSha = result.sha; // 新しいSHAを保持

    localStorage.removeItem('article_backup');
    document.getElementById('save-indicator').textContent = `保存済み ${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('save-indicator').className = 'save-indicator saved';
    showToast(currentStatus === 'published' ? '記事を公開しました 🎉' : '下書きを保存しました');

  } catch(e) {
    showToast('保存に失敗しました: ' + e.message);
    document.getElementById('save-indicator').textContent = '保存失敗';
  } finally {
    saveBtn.disabled = false;
  }
}

function saveDraft() {
  setStatus('draft');
  saveArticle();
}

// === トースト ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// === キーボードショートカット ===
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 's') { e.preventDefault(); saveArticle(); }
    if (e.key === 'k') { e.preventDefault(); openLinkModal(); }
  }
});

// === モーダルクローズ（背景クリック） ===
document.getElementById('link-modal').addEventListener('click', function(e) {
  if (e.target === this) closeLinkModal();
});
</script>
