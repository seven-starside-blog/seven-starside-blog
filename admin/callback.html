<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン処理中... | 管理画面</title>
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #5a0808;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    color: #fff;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    color: #1a1a1a;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }
  @media (prefers-color-scheme: dark) { .card { background: #181818; color: #f0f0f0; } }

  .icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 26px;
  }
  .icon.loading { background: #fff1f1; }
  .icon.success { background: #f0fdf4; }
  .icon.error   { background: #fff1f1; }

  h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  p  { font-size: 13px; color: #666; line-height: 1.6; }
  @media (prefers-color-scheme: dark) { p { color: #999; } }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #ffe0e0;
    border-top-color: #cc2222;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar {
    height: 3px;
    background: #ffe0e0;
    border-radius: 2px;
    margin-top: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #cc2222;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 16px 0 0;
    text-align: left;
  }
  @media (prefers-color-scheme: dark) {
    .user-info { background: #222; border-color: #333; }
  }
  .user-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #cc2222;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px;
    overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name { font-size: 14px; font-weight: 600; }
  .user-email { font-size: 12px; color: #888; }

  .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 24px;
    background: #cc2222;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    transition: background 0.15s;
  }
  .btn:hover { background: #aa1818; }
  .btn-secondary {
    background: none;
    color: #cc2222;
    border: 1.5px solid #cc2222;
  }
  .btn-secondary:hover { background: #fff1f1; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">ログイン確認中...</h2>
  <p id="desc">Googleアカウントを確認しています</p>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<script>
// JWT の payload をデコード（署名検証なし・参照用）
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const decoded = atob(payload.replace(/-/g,'+').replace(/_/g,'/'));
    return JSON.parse(decoded);
  } catch { return null; }
}

// URLハッシュからOAuthトークンを取得
function parseHash() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return {
    accessToken: params.get('access_token'),
    idToken:     params.get('id_token'),
    state:       params.get('state'),
    error:       params.get('error'),
  };
}

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function showError(msg, showRetry = true) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'ログインできませんでした';
  document.getElementById('desc').textContent = msg;
  document.getElementById('progress').parentElement.style.display = 'none';
  if (showRetry) {
    const btn = document.createElement('a');
    btn.href = 'index.html';
    btn.className = 'btn btn-secondary';
    btn.textContent = '← ログイン画面に戻る';
    document.getElementById('card').appendChild(btn);
  }
}

function showSuccess(name, email, picture) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('progress').parentElement.style.display = 'none';
  document.getElementById('title').textContent = 'ログイン完了！';
  document.getElementById('desc').textContent = 'エディターに移動します...';

  const userInfo = document.createElement('div');
  userInfo.className = 'user-info';
  const avatar = picture
    ? `<img src="${picture}" alt="${name}">`
    : name.charAt(0).toUpperCase();
  userInfo.innerHTML = `
    <div class="user-avatar">${picture ? `<img src="${picture}" alt="">` : name.charAt(0)}</div>
    <div>
      <div class="user-name">${name}</div>
      <div class="user-email">${email}</div>
    </div>`;
  document.getElementById('card').appendChild(userInfo);
}

// === メイン処理 ===
window.addEventListener('DOMContentLoaded', async () => {
  setProgress(20);

  const { accessToken, idToken, state, error } = parseHash();

  // エラー返却
  if (error) {
    showError(error === 'access_denied'
      ? 'Googleログインがキャンセルされました。'
      : `Googleからエラーが返されました: ${error}`);
    return;
  }

  // トークンが無い
  if (!idToken) {
    showError('認証トークンが取得できませんでした。もう一度お試しください。');
    return;
  }

  setProgress(50);

  // CSRF（state）チェック
  const savedState = sessionStorage.getItem('oauth_state');
  sessionStorage.removeItem('oauth_state');
  if (!savedState || savedState !== state) {
    showError('セキュリティエラー：不正なリクエストの可能性があります。');
    return;
  }

  setProgress(70);

  // id_token をデコードしてユーザー情報を取得
  const payload = decodeJwt(idToken);
  if (!payload) {
    showError('トークンの解析に失敗しました。');
    return;
  }

  const { email, name, picture, exp } = payload;
  setProgress(85);

  // 許可メールアドレスチェック
  if (typeof BLOG_CONFIG !== 'undefined' &&
      BLOG_CONFIG.ALLOWED_EMAIL &&
      BLOG_CONFIG.ALLOWED_EMAIL !== 'your-email@gmail.com' &&
      email !== BLOG_CONFIG.ALLOWED_EMAIL) {
    showError(`このアカウント（${email}）はアクセス権がありません。`);
    // ログイン失敗をindex.htmlに通知
    setTimeout(() => { window.location.href = 'index.html?error=unauthorized'; }, 2500);
    return;
  }

  setProgress(100);

  // セッション保存（有効期限はGoogleのトークン期限 or 8時間のどちらか短い方）
  const expiresAt = Math.min(
    (exp || 0) * 1000,
    Date.now() + 8 * 60 * 60 * 1000
  );
  const session = { email, name, picture, accessToken, idToken, expiresAt };
  sessionStorage.setItem('admin_session', JSON.stringify(session));

  // URLのハッシュをクリア（トークンをURLに残さない）
  history.replaceState(null, '', window.location.pathname);

  showSuccess(name, email, picture);

  // 1.5秒後にエディターへ
  setTimeout(() => { window.location.href = 'editor.html'; }, 1500);
});
</script>
</body>
</html>
