<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン処理中... | 管理画面</title>
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #5a0808;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    color: #fff;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    color: #1a1a1a;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }
  @media (prefers-color-scheme: dark) { .card { background: #181818; color: #f0f0f0; } }
  h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  p  { font-size: 13px; color: #666; line-height: 1.6; }
  @media (prefers-color-scheme: dark) { p { color: #999; } }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #ffe0e0;
    border-top-color: #cc2222;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar { height: 3px; background: #ffe0e0; border-radius: 2px; margin-top: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: #cc2222; border-radius: 2px; width: 0%; transition: width 0.4s ease; }
  .user-info {
    display: flex; align-items: center; gap: 12px;
    background: #fafafa; border: 1px solid #e8e8e8;
    border-radius: 10px; padding: 12px 14px; margin: 16px 0 0; text-align: left;
  }
  @media (prefers-color-scheme: dark) { .user-info { background: #222; border-color: #333; } }
  .user-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #cc2222; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name  { font-size: 14px; font-weight: 600; }
  .user-email { font-size: 12px; color: #888; }
  .btn {
    display: inline-block; margin-top: 16px; padding: 10px 24px;
    background: #cc2222; color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-decoration: none; transition: background 0.15s;
  }
  .btn:hover { background: #aa1818; }
  .btn-secondary { background: none; color: #cc2222; border: 1.5px solid #cc2222; }
  .btn-secondary:hover { background: #fff1f1; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">ログイン確認中...</h2>
  <p id="desc">Googleアカウントを確認しています</p>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<script>
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
  } catch { return null; }
}

function parseHash() {
  const params = new URLSearchParams(window.location.hash.substring(1));
  return {
    accessToken: params.get('access_token'),
    idToken:     params.get('id_token'),
    state:       params.get('state'),
    error:       params.get('error'),
  };
}

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'ログインできませんでした';
  document.getElementById('desc').textContent = msg;
  document.getElementById('progress').parentElement.style.display = 'none';
  const btn = document.createElement('a');
  btn.href = 'index.html';        // ← 必ずログイン画面に戻す
  btn.className = 'btn btn-secondary';
  btn.textContent = '← ログイン画面に戻る';
  document.getElementById('card').appendChild(btn);
}

function showSuccess(name, email, picture) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('progress').parentElement.style.display = 'none';
  document.getElementById('title').textContent = 'ログイン完了！';
  document.getElementById('desc').textContent = 'エディターに移動します...';
  const userInfo = document.createElement('div');
  userInfo.className = 'user-info';
  userInfo.innerHTML = `
    <div class="user-avatar">${picture ? `<img src="${picture}" alt="">` : name.charAt(0)}</div>
    <div>
      <div class="user-name">${name}</div>
      <div class="user-email">${email}</div>
    </div>`;
  document.getElementById('card').appendChild(userInfo);
}

window.addEventListener('DOMContentLoaded', () => {
  setProgress(20);
  const { accessToken, idToken, state, error } = parseHash();

  // Googleからエラーが返ってきた場合
  if (error) {
    showError(error === 'access_denied'
      ? 'Googleログインがキャンセルされました。'
      : `エラーが発生しました: ${error}`);
    return;
  }

  // id_tokenが無い（直接アクセス等）
  if (!idToken) {
    showError('認証トークンがありません。ログイン画面からやり直してください。');
    return;
  }

  setProgress(50);

  // CSRF（state）チェック
  const savedState = sessionStorage.getItem('oauth_state');
  sessionStorage.removeItem('oauth_state');
  if (!savedState || savedState !== state) {
    showError('セキュリティエラー：不正なリクエストです。');
    return;
  }

  setProgress(70);

  // id_token デコード
  const payload = decodeJwt(idToken);
  if (!payload) {
    showError('トークンの解析に失敗しました。');
    return;
  }

  const { email, name, picture, exp } = payload;
  setProgress(85);

  // 許可メールアドレスチェック
  if (typeof BLOG_CONFIG !== 'undefined' &&
      BLOG_CONFIG.ALLOWED_EMAIL &&
      BLOG_CONFIG.ALLOWED_EMAIL !== 'your-email@gmail.com' &&
      email !== BLOG_CONFIG.ALLOWED_EMAIL) {
    showError(`このアカウント（${email}）にはアクセス権がありません。`);
    // 2.5秒後にログイン画面へ（editor.htmlには飛ばない）
    setTimeout(() => { window.location.href = 'index.html?error=unauthorized'; }, 2500);
    return;
  }

  setProgress(100);

  // セッション保存
  const expiresAt = Math.min(
    (exp || 0) * 1000,
    Date.now() + 8 * 60 * 60 * 1000
  );
  sessionStorage.setItem('admin_session', JSON.stringify(
    { email, name, picture, accessToken, idToken, expiresAt }
  ));

  // URLからハッシュを消す（トークンを残さない）
  history.replaceState(null, '', window.location.pathname);

  showSuccess(name, email, picture);

  // 1.5秒後にエディターへ
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
});
</script>
</body>
</html>
