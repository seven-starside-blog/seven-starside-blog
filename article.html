<style>
  /* 記事ヘッダー */
  .article-hero {
    background: linear-gradient(160deg, var(--red-900), #2a0404);
    padding: 48px 20px 40px;
    color: #fff;
  }
  .article-hero .meta {
    font-size: 12px; color: rgba(255,255,255,0.5);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .article-hero .meta a { color: rgba(255,255,255,0.65); }
  .article-hero .meta a:hover { color: #fff; }
  .article-hero h1 { font-size: clamp(22px, 4vw, 34px); font-weight: 800; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 16px; }
  .article-hero .hero-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .article-hero .hero-tags .tag { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
  .article-hero .hero-tags .tag:hover { background: rgba(255,255,255,0.2); }

  /* サムネイル */
  .article-thumb {
    width: 100%; max-height: 400px; object-fit: cover;
    display: block;
  }

  /* レイアウト */
  .article-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 32px;
    padding: 36px 0 60px;
  }
  @media (min-width: 900px) {
    .article-layout { grid-template-columns: minmax(0, 1fr) 240px; }
  }

  /* 本文 */
  .article-body {
    font-size: 16px; line-height: 1.9; color: var(--text);
    /* 長いURLや英数字でもコンテナ幅をはみ出さないよう折り返す */
    overflow-wrap: break-word;
    word-break: break-word;
    min-width: 0;
  }
  .article-body a { overflow-wrap: break-word; word-break: break-word; }
  .article-body h1 { font-size: 24px; font-weight: 700; margin: 32px 0 12px; }
  .article-body h2 {
    font-size: 20px; font-weight: 700; margin: 28px 0 10px;
    padding-bottom: 6px; border-bottom: 2px solid var(--red-200);
    color: var(--text);
  }
  .article-body h3 { font-size: 17px; font-weight: 700; margin: 20px 0 8px; }
  .article-body p  { margin: 0 0 16px; }
  .article-body strong { color: var(--accent); font-weight: 700; }
  .article-body em { font-style: italic; }
  .article-body a  { color: var(--accent); text-decoration: underline; }
  .article-body a:hover { opacity: 0.8; }
  .article-body blockquote {
    border-left: 3px solid var(--red-400);
    padding: 8px 16px; margin: 16px 0;
    background: var(--red-50); color: var(--text-muted);
    border-radius: 0 6px 6px 0;
  }
  .article-body code {
    background: var(--gray-100); border: 1px solid var(--gray-200);
    border-radius: 4px; padding: 2px 6px;
    font-family: 'Menlo', monospace; font-size: 13px;
  }
  .article-body pre {
    background: var(--gray-900); color: #e0e0e0;
    padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0;
  }
  .article-body pre code { background: none; border: none; color: inherit; }
  .article-body ul, .article-body ol { padding-left: 24px; margin: 8px 0 16px; }
  .article-body li { margin-bottom: 4px; }
  .article-body img { border-radius: 8px; margin: 16px 0; max-width: 100%; }
  .article-body hr { border: none; border-top: 2px solid var(--red-100); margin: 24px 0; }
  .article-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
  .article-body th, .article-body td { padding: 10px 12px; border: 1px solid var(--border); text-align: left; }
  .article-body th { background: var(--gray-100); font-weight: 600; }

  /* タグセクション */
  .article-tags-section { margin: 32px 0 0; padding-top: 20px; border-top: 1px solid var(--border); }
  .article-tags-section .label { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 8px; }
  .article-tags-section .tags { display: flex; flex-wrap: wrap; gap: 6px; }

  /* 広告（記事内） */
  .article-ad { margin: 36px 0; }

  /* 前後ナビ */
  .article-nav {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 36px;
  }
  .nav-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.15s, box-shadow 0.15s;
    text-decoration: none; color: inherit;
  }
  .nav-btn:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(204,34,34,0.1); }
  .nav-btn .nav-dir { font-size: 11px; color: var(--accent); font-weight: 600; }
  .nav-btn .nav-title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
  .nav-btn.next { text-align: right; }
  .nav-btn.prev { text-align: left; }

  /* おすすめ記事 */
  .recommend-section { margin-top: 40px; }
  .recommend-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .recommend-section h2 span { color: var(--accent); }
  .recommend-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

  .recommend-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: flex; gap: 12px; align-items: flex-start;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s;
  }
  .recommend-card:hover { border-color: var(--accent); }
  .recommend-card .thumb-mini {
    width: 64px; height: 48px; border-radius: 5px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--red-900), var(--red-700));
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3); font-size: 18px; overflow: hidden;
  }
  .recommend-card .thumb-mini img { width: 100%; height: 100%; object-fit: cover; }
  .recommend-card .info .date { font-size: 11px; color: var(--text-muted); }
  .recommend-card .info .title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }

  /* サイドバー */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }
  .sidebar-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .sidebar-card h3 { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.03em; }
  /* ── 目次：サイドバー（PC）── */
  .toc-list { list-style: none; padding: 0; font-size: 13px; }
  .toc-list li { padding: 4px 0; border-bottom: 1px solid var(--border); }
  .toc-list li:last-child { border-bottom: none; }
  .toc-list a { color: var(--text-muted); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toc-list a:hover { color: var(--accent); }
  /* 「概要」タブ（PC目次の先頭） */
  .toc-overview-item a { color: var(--accent); font-weight: 600; }
  /* ── 目次：インライン（スマホ） ── */
  .toc-inline {
    display: none; /* デフォルト非表示、スマホで表示 */
    background: var(--red-50);
    border: 1px solid var(--red-100);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 20px 0;
  }
  .toc-inline h3 { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .toc-inline ol { list-style: none; padding: 0; font-size: 13px; counter-reset: toc-counter; }
  .toc-inline li { counter-increment: toc-counter; padding: 5px 0; border-bottom: 1px solid var(--red-100); display: flex; align-items: baseline; gap: 6px; }
  .toc-inline li:last-child { border-bottom: none; }
  .toc-inline li::before { content: counter(toc-counter); font-size: 11px; color: var(--accent); font-weight: 700; min-width: 16px; }
  .toc-inline a { color: var(--text); text-decoration: none; flex: 1; }
  .toc-inline a:hover { color: var(--accent); }
  @media (max-width: 899px) {
    .toc-inline { display: block; }
    /* スマホではサイドバー目次を非表示（インライン目次に切替） */
    .toc-sidebar-card { display: none; }
  }
  .sidebar-sticky { position: sticky; top: calc(var(--header-h) + 16px); }
  /* OGPカード（記事本文内） */
  .ogp-card-wrap { position: relative; display: block; margin: 12px 0; }
  .ogp-card-wrap .ogp-delete-btn { display: none !important; }
  .ogp-card {
    display: flex !important; gap: 0;
    border: 1px solid #2a1010 !important;
    border-radius: 10px; overflow: hidden;
    text-decoration: none !important;
    background: #1a0808 !important;
    transition: box-shadow 0.15s;
    color: #fff !important;
  }
  .ogp-card:hover { box-shadow: 0 2px 12px rgba(204,34,34,0.2); }
  .ogp-card img { width: 120px; min-height: 80px; object-fit: cover; flex-shrink: 0; }
  .ogp-card-body { padding: 12px 14px; min-width: 0; flex: 1; }
  .article-body .ogp-card-title,
  .ogp-card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cc2222 !important; }
  .article-body .ogp-card-desc,
  .ogp-card-desc  { font-size: 12px; color: rgba(255,255,255,0.75) !important; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.5; margin-bottom: 4px; word-break: break-word; }
  .article-body .ogp-card-site,
  .ogp-card-site  { font-size: 11px; color: rgba(255,255,255,0.45) !important; }
  @media (max-width: 600px) {
    .article-hero { padding: 32px 16px 28px; }
    .article-hero h1 { font-size: 22px; }
    .article-hero .meta { font-size: 11px; }
    .article-thumb { max-height: 220px; }
    .article-layout { padding: 24px 0 40px; gap: 24px; }
    .article-body { font-size: 15px; }
    .article-body h1 { font-size: 20px; }
    .article-body h2 { font-size: 18px; }
    .article-body h3 { font-size: 16px; }
    .article-body pre { padding: 12px; font-size: 12.5px; }

    /* 前後ナビ：2カラム→1カラム */
    .article-nav { grid-template-columns: 1fr; gap: 8px; }
    .nav-btn.next { text-align: left; }

    .recommend-card { padding: 10px 12px; }
    .recommend-card .thumb-mini { width: 52px; height: 40px; }

    .sidebar-card { padding: 14px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="./" class="logo">ナナボシサイド<span>★</span>ブログ</a>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>
</header>

<main class="page-body" id="main-content">
  <div class="loading-spinner" style="padding:80px 0">
    <div class="spinner"></div><span>読み込み中...</span>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-links">
    <a href="./">トップ</a>
    <a href="about.html">自己紹介</a>
    <a href="articles.html">記事一覧</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
  <div>© 2025 ナナボシサイド★ブログ</div>
</footer>

<script src="assets/app.js"></script>
<script>
initDrawer('articles.html');

(async () => {
  const params  = new URLSearchParams(location.search);
  const id      = params.get('id');
  const articles = await fetchArticles();
  const idx     = articles.findIndex(a => a.id === id);
  const article = articles[idx];

  const main = document.getElementById('main-content');

  if (!article) {
    main.innerHTML = `
      <div class="empty-state" style="padding:80px 20px">
        <div class="icon">😕</div>
        <p>記事が見つかりませんでした</p>
        <a href="${REPO_BASE}/articles.html" style="color:var(--accent);font-size:13px;margin-top:12px;display:inline-block;">← 記事一覧に戻る</a>
      </div>`;
    return;
  }

  // ページタイトル設定
  document.title = `${article.title} | ナナボシサイド★ブログ`;

  // OGP・metaを動的に更新（Search Console・SNSシェア対策）
  const pageUrl = `https://seven-starside-blog.github.io/seven-starside-blog/article.html?id=${article.id}`;
  const desc    = article.excerpt || article.title;
  const image   = article.thumbnail || '';
  const setMeta = (sel, attr, val) => {
    const el = document.querySelector(sel);
    if (el) el.setAttribute(attr, val);
  };
  setMeta('meta[name="description"]',           'content', desc);
  setMeta('meta[property="og:title"]',          'content', `${article.title} | ナナボシサイド★ブログ`);
  setMeta('meta[property="og:description"]',    'content', desc);
  setMeta('meta[property="og:url"]',            'content', pageUrl);
  setMeta('meta[property="og:type"]',           'content', 'article');
  setMeta('meta[name="twitter:title"]',         'content', `${article.title} | ナナボシサイド★ブログ`);
  setMeta('meta[name="twitter:description"]',   'content', desc);
  setMeta('link[rel="canonical"]',              'href',    pageUrl);
  if (image) {
    // og:imageがなければ追加
    if (!document.querySelector('meta[property="og:image"]')) {
      const ogImg = document.createElement('meta');
      ogImg.setAttribute('property', 'og:image');
      ogImg.setAttribute('content', image);
      document.head.appendChild(ogImg);
      const twImg = document.createElement('meta');
      twImg.setAttribute('name', 'twitter:image');
      twImg.setAttribute('content', image);
      document.head.appendChild(twImg);
    } else {
      setMeta('meta[property="og:image"]', 'content', image);
      setMeta('meta[name="twitter:image"]', 'content', image);
    }
  }

  // 前後記事
  const prev = idx < articles.length - 1 ? articles[idx + 1] : null;
  const next = idx > 0 ? articles[idx - 1] : null;

  // おすすめ（同タグの別記事 or ランダム3件）
  const recommends = articles
    .filter(a => a.id !== id)
    .filter(a => (a.tags||[]).some(t => (article.tags||[]).includes(t)))
    .slice(0, 3);
  const fillCount = 3 - recommends.length;
  if (fillCount > 0) {
    articles.filter(a => a.id !== id && !recommends.includes(a)).slice(0, fillCount)
      .forEach(a => recommends.push(a));
  }

  // ── 目次生成 ──────────────────────────────────────────────────
  const h2Matches = [...(article.content.matchAll(/<h2[^>]*>(.*?)<\/h2>/gi))];
  const hasH2 = h2Matches.length > 0;

  // 本文のh2にIDを付与
  let bodyHTML = article.content.replace(/<h2([^>]*)>(.*?)<\/h2>/gi, (_, attr, text, offset) => {
    const idx2 = [...(article.content.matchAll(/<h2[^>]*>(.*?)<\/h2>/gi))].findIndex(m => m.index === offset);
    return `<h2${attr} id="heading-${idx2}">${text}</h2>`;
  });

  // 記事がh2始まりかどうか（先頭のブロックタグを確認）
  const firstTagMatch = article.content.trim().match(/^<([a-z0-9]+)/i);
  const firstTag = firstTagMatch ? firstTagMatch[1].toLowerCase() : '';
  const startsWithH2 = firstTag === 'h2';

  // PC：サイドバー目次HTML
  const tocHTML = hasH2 ? (() => {
    const overviewItem = startsWithH2
      ? ''
      : `<li class="toc-overview-item"><a href="#article-top">概要</a></li>`;
    const items = h2Matches.map((m,i) =>
      `<li><a href="#heading-${i}">${m[1]}</a></li>`
    ).join('');
    return `<div class="sidebar-card toc-sidebar-card">
      <h3>目次</h3>
      <ul class="toc-list">
        ${overviewItem}${items}
      </ul>
    </div>`;
  })() : '';

  // スマホ：インライン目次HTML（1つ目のh2の直前に挿入）
  const inlineTocHTML = hasH2 ? (() => {
    const items = h2Matches.map((m,i) =>
      `<li><a href="#heading-${i}">${m[1]}</a></li>`
    ).join('');
    return `<div class="toc-inline">
      <h3>目次</h3>
      <ol>${items}</ol>
    </div>`;
  })() : '';

  // インライン目次を1つ目のh2の直前（通常テキストがあればその後）に挿入
  if (hasH2) {
    // 1つ目の <h2 の位置を探して直前に挿入
    bodyHTML = bodyHTML.replace(/(<h2[^>]* id="heading-0"[^>]*>)/, inlineTocHTML + '$1');
  }

  main.innerHTML = `
    <!-- ヒーロー -->
    <div class="article-hero">
      <div class="container">
        <div class="meta">
          <a href="${REPO_BASE}/articles.html">記事一覧</a>
          <span>›</span>
          <span>${formatDate(article.date)}</span>
        </div>
        <h1>${article.title}</h1>
        <div class="hero-tags">
          ${(article.tags||[]).map(t =>
            `<a href="${REPO_BASE}/articles.html?tag=${encodeURIComponent(t)}" class="tag">${t}</a>`
          ).join('')}
        </div>
      </div>
    </div>

    ${article.thumbnail ? `<img src="${article.thumbnail}" class="article-thumb" alt="${article.title}">` : ''}

    <!-- 本文レイアウト -->
    <div class="container">
      <div class="article-layout">
        <!-- メインコンテンツ -->
        <div>
          <!-- 広告（本文上） -->
          <div class="ad-unit article-ad">広告スペース</div>

          <article class="article-body" id="article-top">${bodyHTML}</article>

          <!-- タグ -->
          <div class="article-tags-section">
            <div class="label">タグ</div>
            <div class="tags">
              ${(article.tags||[]).map(t =>
                `<a href="${REPO_BASE}/articles.html?tag=${encodeURIComponent(t)}" class="tag">${t}</a>`
              ).join('')}
            </div>
          </div>

          <!-- 広告（本文下） -->
          <div class="ad-unit article-ad">広告スペース</div>

          <!-- 前後ナビ -->
          <nav class="article-nav">
            ${prev ? `<a href="${REPO_BASE}/article.html?id=${prev.id}" class="nav-btn prev">
              <span class="nav-dir">← 前の記事</span>
              <span class="nav-title">${prev.title}</span>
            </a>` : '<div></div>'}
            ${next ? `<a href="${REPO_BASE}/article.html?id=${next.id}" class="nav-btn next">
              <span class="nav-dir">次の記事 →</span>
              <span class="nav-title">${next.title}</span>
            </a>` : '<div></div>'}
          </nav>

          <!-- おすすめ記事 -->
          ${recommends.length ? `
          <div class="recommend-section">
            <h2><span>★</span> おすすめ記事</h2>
            <div class="recommend-grid">
              ${recommends.map(a => `
                <a href="${REPO_BASE}/article.html?id=${a.id}" class="recommend-card">
                  <div class="thumb-mini">${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : '✦'}</div>
                  <div class="info">
                    <div class="date">${formatDate(a.date)}</div>
                    <div class="title">${a.title}</div>
                  </div>
                </a>`).join('')}
            </div>
          </div>` : ''}
        </div>

        <!-- サイドバー -->
        <aside class="sidebar">
          <div class="sidebar-sticky">
            ${tocHTML}
            <div class="ad-unit" style="min-height:250px;flex-direction:column;gap:4px;">
              <div>広告スペース</div><div style="font-size:11px;">(サイドバー)</div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  `;
})();
</script>
</body>
</html>
